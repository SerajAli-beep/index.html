<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ARV Institute | Premium Admission for Students</title>
        <script
            src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap"
            rel="stylesheet">
        <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #1a1a2e, #000);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,242,255,0.1);
            transform: perspective(1000px) rotateX(2deg);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: perspective(1000px) rotateX(0deg);
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            border-radius: 12px;
            color: #54a8ec;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0,242,255,0.4);
            outline: none;
            background: rgba(255,255,255,0.1);
        }

        button {
            width: 100%;
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #000;
            font-size: 1.4rem;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,242,255,0.3);
            transition: 0.4s;
        }

        button:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,242,255,0.5);
            color: #fff;
        }

        .footer-credit {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #666;
        }

        @media (max-width: 600px) { .grid-layout { grid-template-columns: 1fr; } }
    </style>
    </head>
    <body>

        <div class="container">
            <h1>ARV INSTITUTE</h1>
            <p
                style="text-align:center; color:#888; margin-bottom:30px;">Premium
                Registration 2026</p>

            <div class="grid-layout">
                <div class="input-group">
                    <label>👤 Student Name</label>
                    <input id="name" type="text" placeholder="Full Name">
                </div>
                <div class="input-group">
                    <label>🎂 Date of Birth</label>
                    <input id="dob" type="date">
                </div>
            </div>

            <div class="grid-layout">
                <div class="input-group">
                    <label>👨 Father Name</label>
                    <input id="father" type="text" placeholder="Father Name">
                </div>
                <div class="input-group">
                    <label>💼 Father Occupation</label>
                    <input id="occupation" type="text"
                        placeholder="Job/Business">
                </div>
            </div>

            <div class="grid-layout">
                <div class="input-group">
                    <label>🎓 Qualification</label>
                    <input id="qualification" type="text"
                        placeholder="e.g. 12th, Graduate">
                </div>
                <div class="input-group">
                    <label>🤔 Who are you?</label>
                    <select id="whoareyou">
                        <option>Student</option>
                        <option>Job Seeker</option>
                        <option>Working Professional</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>🎯 Why do you want to learn?</label>
                <textarea id="reason" rows="2"
                    placeholder="Tell us your goal..."></textarea>
            </div>

            <div class="grid-layout">
                <div class="input-group">
                    <label>📚 Course Selection</label>
                    <select id="course">
                        <option>English Speaking Course</option>
                        <option>Digital Marketing</option>
                        <option>Video Editing</option>
                        <option>Graphic Design</option>
                        <option>Web Development</option>
                        <option>Advance Computer Course</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>👨‍🏫 Trainer Name</label>
                    <input id="trainer" type="text"
                        placeholder="Preferred Trainer">
                </div>
            </div>

            <div class="grid-layout">
                <div class="input-group">
                    <label>⏳ Duration</label>
                    <select id="duration">
                        <option>3 Months</option>
                        <option>6 Months</option>
                        <option>12 Months</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>🕒 Batch Timing</label>
                    <select id="timing">
                        <option>Morning (6 AM - 7 AM)</option>
                        <option>Morning (7 AM - 8 AM)</option>
                        <option>Morning (8 PM - 9 PM)</option>
                        <option>Morning (9 PM - 10 PM)</option>
                        <option>Morning (10 PM - 11 PM)</option>
                        <option>Evening (4 PM - 5 PM)</option>
                        <option>Evening (5 PM - 6 PM)</option>
                        <option>Evening (6 PM - 7 PM)</option>
                        <option>Evening (7 PM - 8 PM)</option>
                        <option>Evening (8 PM - 9 PM)</option>
                        <option>Evening (9 PM - 10 PM)</option>
                    </select>
                </div>
            </div>

            <div class="grid-layout">
                <div class="input-group">
                    <label>📅 Date of Joining</label>
                    <input id="doj" type="date">
                </div>
                <div class="input-group">
                    <label>📍 District & State</label>
                    <input id="location" type="text" placeholder="City, State">
                </div>
            </div>

            <div class="grid-layout">
                <div class="input-group">
                    <label>📱 WhatsApp Number</label>
                    <input id="phone" type="tel" placeholder="Your Number">
                </div>
                <div class="input-group">
                    <label>🚨 Emergency Number</label>
                    <input id="emergency" type="tel"
                        placeholder="Parent's Number">
                </div>
            </div>

            <button onclick="submitForm()">🚀 Confirm Registration</button>

            <p class="footer-credit">Made with ❤️ by Mohammad Seraj Ali</p>
        </div>

        <script>
function submitForm() {
    // Collect Data
    let data = {
        name: document.getElementById("name").value,
        dob: document.getElementById("dob").value,
        father: document.getElementById("father").value,
        occupation: document.getElementById("occupation").value,
        qualification: document.getElementById("qualification").value,
        whoareyou: document.getElementById("whoareyou").value,
        reason: document.getElementById("reason").value,
        course: document.getElementById("course").value,
        trainer: document.getElementById("trainer").value,
        duration: document.getElementById("duration").value,
        timing: document.getElementById("timing").value,
        doj: document.getElementById("doj").value,
        location: document.getElementById("location").value,
        phone: document.getElementById("phone").value,
        emergency: document.getElementById("emergency").value
    };

    // 🔹 Basic Validation
    if (!data.name || !data.phone) {
        alert("Please fill Name and Phone Number");
        return;
    }

    // 🔹 Google Sheets Submission
    fetch("https://script.google.com/macros/s/AKfycbyfLajCLw1cjvWj2C5RmwRLt3rqNpGC7KT-uNihndMWMfQGGJttM0e_Af2KB-n6v83q/exec", {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    // 🔹 WhatsApp Message
    let wpMessage = `*New Admission ARV Institute*%0A%0A
*Name:* ${data.name}%0A
*DOB:* ${data.dob}%0A
*Father:* ${data.father}%0A
*Occupation:* ${data.occupation}%0A
*Qualification:* ${data.qualification}%0A
*Who:* ${data.whoareyou}%0A
*Reason:* ${data.reason}%0A
*Course:* ${data.course}%0A
*Trainer:* ${data.trainer}%0A
*Duration:* ${data.duration}%0A
*Timing:* ${data.timing}%0A
*Joining:* ${data.doj}%0A
*Location:* ${data.location}%0A
*Phone:* ${data.phone}%0A
*Emergency:* ${data.emergency}`;

    // 🎉 Confetti
    confetti({
        particleCount: 200,
        spread: 100,
        origin: { y: 0.6 }
    });

    // 🔹 WhatsApp Redirect
    setTimeout(() => {
        alert("✅ Data saved & opening WhatsApp...");
        window.open(`https://wa.me/918126627241?text=${wpMessage}`, '_blank');
    }, 1200);
}
</script>

    </body>
</html>
